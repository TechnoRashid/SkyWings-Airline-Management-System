<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AMS – Flight Results</title>
<link rel="stylesheet" href="style.css">
<style>
body { min-height: 100vh; }
.results-wrap { max-width: 900px; margin: 0 auto; padding: 30px 20px 60px; }
.filter-bar { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 24px; }
.filter-chip {
  padding: 7px 18px; border-radius: 50px; border: 1.5px solid rgba(255,255,255,0.3);
  background: transparent; color: #fff; font-size: 0.85rem; cursor: pointer; transition: all 0.2s;
}
.filter-chip:hover, .filter-chip.active { background: var(--accent); border-color: var(--accent); }

.flight-card {
  background: rgba(255,255,255,0.95);
  color: #222;
  border-radius: 16px;
  padding: 22px;
  margin-bottom: 16px;
  display: grid;
  grid-template-columns: 1fr auto 1fr auto;
  align-items: center;
  gap: 20px;
  box-shadow: 0 4px 18px rgba(0,0,0,0.12);
  transition: transform 0.2s;
}
.flight-card:hover { transform: translateY(-2px); }
.airline-name { font-size: 0.82rem; color: #888; }
.flight-no { font-size: 1rem; font-weight: 700; color: var(--teal-dark); }
.time { font-size: 1.6rem; font-weight: 700; }
.city { font-size: 0.85rem; color: #666; margin-top: 2px; }
.route-line { text-align: center; }
.duration { font-size: 0.78rem; color: #999; margin-bottom: 4px; }
.line { height: 2px; background: linear-gradient(to right, var(--teal), var(--accent)); border-radius: 2px; position: relative; }
.line::after { content:'✈'; position:absolute; right:-8px; top:-9px; font-size:1rem; }
.stops { font-size: 0.75rem; color: #999; margin-top: 4px; }
.price-box { text-align: right; }
.price { font-size: 1.6rem; font-weight: 700; color: var(--teal-dark); }
.price-sub { font-size: 0.78rem; color: #999; }
.btn-select {
  background: var(--teal); color: #fff; border: none;
  padding: 10px 22px; border-radius: 50px; font-size: 0.9rem;
  font-weight: 600; cursor: pointer; white-space: nowrap;
  transition: background 0.2s; margin-top: 8px;
}
.btn-select:hover { background: var(--teal-dark); }

.tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.72rem; font-weight: 700; margin-bottom: 4px; }
.tag-cheapest { background: #e8f5e9; color: #2e7d32; }
.tag-fastest { background: #e3f2fd; color: #1565c0; }

@media (max-width: 600px) {
  .flight-card { grid-template-columns: 1fr 1fr; gap: 12px; }
  .time { font-size: 1.2rem; }
}
</style>
</head>
<body>
<nav class="navbar">
  <div class="nav-brand"><i class='bx bxs-plane-alt'></i> SkyWings AMS</div>
  <button class="nav-toggle" id="nav-toggle"><i class='bx bx-menu'></i></button>
  <div class="nav-links" id="nav-links">
    <a href="home.html"><i class='bx bxs-home'></i> Home</a>
    <a href="profile.html"><i class='bx bxs-user-circle'></i> My Profile</a>
    <a href="trips.html"><i class='bx bxs-plane-take-off'></i> My Trips</a>
    <a href="booking.html"><i class='bx bxs-purchase-tag'></i> Book Flight</a>
    <a href="checkin.html"><i class='bx bxs-id-card'></i> Check-In</a>
    <a href="login.html" onclick="AMS.logout();return false;"><i class='bx bx-log-out'></i> Logout</a>
  </div>
  <div class="nav-welcome" id="nav-welcome"></div>
</nav>

<div class="results-wrap">
  <div id="search-header" style="margin-bottom:24px; display:flex; align-items:center; justify-content:space-between; gap:18px; flex-wrap:wrap;">
    <div>
      <h2 style="font-family:var(--font-display);font-size:1.8rem;" id="route-title">Available Flights</h2>
      <p style="opacity:0.7;margin-top:4px;" id="route-sub">Showing all available flights</p>
    </div>
    <button class="btn-secondary" type="button" onclick="editSearch()"><i class='bx bx-edit'></i> Edit Search</button>
  </div>

  <div class="filter-bar">
    <span style="opacity:0.7;align-self:center;font-size:0.88rem;">Sort by:</span>
    <button class="filter-chip active" data-sort="Cheapest">Cheapest</button>
    <button class="filter-chip" data-sort="Fastest">Fastest</button>
    <button class="filter-chip" data-sort="Earliest">Earliest</button>
    <button class="filter-chip" data-sort="Economy">Economy</button>
    <button class="filter-chip" data-sort="Business">Business</button>
  </div>

  <div id="flights-list">
    <!-- Injected by JS -->
  </div>
</div>

<footer>© 2025 SkyWings Airline Management System</footer>
<script src="utils.js"></script>
<script>
loadNavUser();
initNavToggle();

const s = AMS.get('search') || {};
if (s.org && s.dst) {
  document.getElementById('route-title').textContent = `${s.org} → ${s.dst}`;
  document.getElementById('route-sub').textContent = `${s.dep || 'Any date'} · ${s.travellers||1} Passenger(s) · ${s.cls||'Economy'}`;
}

const FLIGHTS = [
  { airline:'SkyWings', no:'SW-201', dep:'06:00', arr:'08:15', dur:'2h 15m', stops:'Non-stop', price:'₹4,299', tag:'fastest' },
  { airline:'AirIndia', no:'AI-808', dep:'09:30', arr:'12:00', dur:'2h 30m', stops:'Non-stop', price:'₹5,199', tag:'' },
  { airline:'IndiGo', no:'6E-415', dep:'13:00', arr:'15:45', dur:'2h 45m', stops:'1 Stop', price:'₹3,499', tag:'' },
  { airline:'Vistara', no:'UK-890', dep:'17:15', arr:'19:55', dur:'2h 40m', stops:'Non-stop', price:'₹6,899', tag:'' },
  { airline:'SpiceJet', no:'SG-121', dep:'20:00', arr:'22:20', dur:'2h 20m', stops:'Non-stop', price:'₹2,999', tag:'cheapest' },
];

const org = s.org || 'Origin';
const dst = s.dst || 'Destination';

const SORT_MODES = {
  Cheapest: (a,b) => parsePrice(a.price) - parsePrice(b.price),
  Fastest: (a,b) => parseDuration(a.dur) - parseDuration(b.dur),
  Earliest: (a,b) => parseTime(a.dep) - parseTime(b.dep),
  Economy: (a,b) => parsePrice(a.price) - parsePrice(b.price),
  Business: (a,b) => parsePrice(b.price) - parsePrice(a.price)
};

function parsePrice(price) {
  return Number(price.replace(/[^0-9]/g, ''));
}
function parseDuration(dur) {
  const match = dur.match(/(\d+)h\s*(\d+)?m?/);
  if (!match) return 0;
  return Number(match[1]) * 60 + Number(match[2] || 0);
}
function parseTime(time) {
  const match = time.match(/(\d+):(\d+)/);
  if (!match) return 0;
  return Number(match[1]) * 60 + Number(match[2]);
}

function renderFlights(list) {
  const minPrice = Math.min(...list.map(f => parsePrice(f.price)));
  const minDuration = Math.min(...list.map(f => parseDuration(f.dur)));

  document.getElementById('flights-list').innerHTML = list.map(f => {
    const isCheapest = parsePrice(f.price) === minPrice;
    const isFastest = parseDuration(f.dur) === minDuration;
    const tagLabel = isFastest ? 'FASTEST' : isCheapest ? 'CHEAPEST' : '';
    const tagClass = isFastest ? 'tag-fastest' : isCheapest ? 'tag-cheapest' : '';

    return `
    <div class="flight-card">
      <div>
        <div class="airline-name">${f.airline}</div>
        <div class="flight-no">${f.no}</div>
        ${tagLabel ? `<span class="tag ${tagClass}">${tagLabel}</span>` : ''}
      </div>
      <div>
        <div class="time">${f.dep}</div>
        <div class="city">${org}</div>
      </div>
      <div class="route-line">
        <div class="duration">${f.dur}</div>
        <div class="line"></div>
        <div class="stops">${f.stops}</div>
      </div>
      <div>
        <div class="time">${f.arr}</div>
        <div class="city">${dst}</div>
      </div>
      <div class="price-box" style="grid-column:span 4;display:flex;justify-content:space-between;align-items:center;border-top:1px solid #eee;padding-top:14px;">
        <div>
          <div class="price">${f.price}</div>
          <div class="price-sub">per person · ${s.cls||'Economy'}</div>
        </div>
        <button class="btn-select" onclick="selectFlight('${f.no}','${f.price}')">Select →</button>
      </div>
    </div>
  `;
  }).join('');
}

function sortAndRender(mode) {
  const selectedMode = String(mode || 'Cheapest').trim();
  const sorted = FLIGHTS.slice();
  if (SORT_MODES[selectedMode]) {
    sorted.sort(SORT_MODES[selectedMode]);
  }
  document.getElementById('route-sub').textContent = `${s.dep || 'Any date'} · ${s.travellers||1} Passenger(s) · ${s.cls||'Economy'} · Sorted by ${selectedMode}`;
  renderFlights(sorted);
}

function clearActiveFilter() {
  document.querySelectorAll('.filter-chip').forEach(x => x.classList.remove('active'));
}

document.querySelectorAll('.filter-chip').forEach(c =>
  c.addEventListener('click', () => {
    clearActiveFilter();
    c.classList.add('active');
    sortAndRender(c.dataset.sort || c.textContent.trim());
  })
);

sortAndRender('Cheapest');

function selectFlight(no, price) {
  if (AMS.isGuest()) {
    alert('You must register or login to book a flight. Click OK to continue registration.');
    window.location.href = 'register.html';
    return;
  }
  AMS.save('selectedFlight', { no, price, org: s.org, dst: s.dst, dep: s.dep });
  window.location.href = 'booking.html';
}

function editSearch() {
  window.location.href = 'home.html';
}
</script>
</body>
</html>
