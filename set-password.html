<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AMS – Set New Password</title>
<link rel="stylesheet" href="style.css">
<style>
body {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  background: radial-gradient(circle at top left, rgba(255, 54, 107, 0.24), transparent 26%),
              radial-gradient(circle at 80% 20%, rgba(38, 196, 255, 0.18), transparent 22%),
              linear-gradient(180deg, #02040d 0%, #07182f 45%, #0e203f 100%);
  color: #fff;
}
.page-wrap {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 42px 18px 24px;
}
.card {
  width: 100%;
  max-width: 520px;
  border-radius: 28px;
  background: rgba(7, 11, 29, 0.94);
  border: 1px solid rgba(255,255,255,0.12);
  box-shadow: 0 32px 80px rgba(0, 0, 0, 0.32);
  overflow: hidden;
  position: relative;
}
.card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(160deg, rgba(255,255,255,0.08), transparent 34%);
  pointer-events: none;
}
.card::after {
  content: '';
  position: absolute;
  top: -48px;
  left: 50%;
  width: 180%;
  height: 220px;
  transform: translateX(-50%);
  background: radial-gradient(circle at center, rgba(255, 50, 85, 0.18), transparent 55%);
  pointer-events: none;
}
.card-body {
  position: relative;
  z-index: 1;
  padding: 40px 36px 34px;
}
.top-badge {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: rgba(255, 16, 76, 0.14);
  border: 1px solid rgba(255, 16, 76, 0.28);
  color: #ffbac2;
  border-radius: 999px;
  padding: 10px 16px;
  margin-bottom: 24px;
  font-weight: 600;
  font-size: 0.92rem;
}
.top-badge i {
  font-size: 1.2rem;
}
.card h2 {
  margin-bottom: 14px;
  color: #fff;
  font-family: var(--font-display);
  font-size: 2rem;
  letter-spacing: -0.03em;
}
.card p {
  margin-bottom: 30px;
  color: rgba(255,255,255,0.72);
  line-height: 1.75;
  font-size: 1rem;
}
.input-group {
  margin-bottom: 18px;
}
.input-group label {
  display: block;
  margin-bottom: 10px;
  color: #d7e1ff;
  font-weight: 700;
  font-size: 0.92rem;
  letter-spacing: 0.04em;
}
.input-group input {
  width: 100%;
  padding: 14px 18px;
  border-radius: 18px;
  border: 1px solid rgba(255,255,255,0.18);
  background: rgba(255,255,255,0.06);
  color: #fff;
  font-size: 1rem;
  outline: none;
  transition: border 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
}
.input-group input::placeholder {
  color: rgba(255,255,255,0.55);
}
.input-group input:focus {
  border-color: rgba(255, 86, 112, 0.9);
  background: rgba(255,255,255,0.12);
  box-shadow: 0 0 0 5px rgba(255, 86, 112, 0.12);
}
.passenger-id {
  width: 100%;
  min-height: 56px;
  display: flex;
  align-items: center;
  padding: 14px 18px;
  border-radius: 18px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.18);
  color: #fff;
  font-weight: 600;
}
.btn-primary {
  width: 100%;
  padding: 15px 0;
  margin-top: 10px;
  border: none;
  border-radius: 999px;
  cursor: pointer;
  font-size: 1rem;
  font-weight: 700;
  color: #fff;
  background: linear-gradient(135deg, #ff0f4f 0%, #ff7a00 100%);
  box-shadow: 0 18px 36px rgba(255, 38, 108, 0.24);
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}
.btn-primary:hover {
  transform: translateY(-1px);
  box-shadow: 0 22px 42px rgba(255, 38, 108, 0.32);
}
.msg {
  min-height: 22px;
  margin-bottom: 10px;
  color: #ffb3b9;
  font-size: 0.95rem;
}
.success {
  color: #7df2c8;
}
.footer-legal {
  padding: 18px 28px 20px;
  text-align: center;
  color: rgba(255,255,255,0.62);
  font-size: 0.9rem;
}
@media (max-width: 620px) {
  .card {
    border-radius: 24px;
  }
  .card-body {
    padding: 30px 24px 28px;
  }
}
</style>
</head>
<body>
<nav class="navbar">
  <div class="nav-brand"><i class='bx bxs-plane-alt'></i> SkyWings AMS</div>
  <div style="font-size:0.85rem;opacity:0.8;"><a href="login.html" style="color:#ffb3b9;font-weight:600;">Back to Login</a></div>
</nav>
<div class="page-wrap">
  <section class="card">
    <div class="card-body">
      <div class="top-badge"><i class='bx bxs-shield-quarter'></i> Secure welcome</div>
      <h2>Set Your New Password</h2>
      <p>Your account requires a password update for security. Enter a new password to continue.</p>
      <div id="status-msg" class="msg"></div>
      <div class="input-group">
        <label for="passenger-id">Passenger ID</label>
        <div id="user-id" class="passenger-id">Loading...</div>
      </div>
      <div class="input-group">
        <label for="new-password">New Password</label>
        <input type="password" id="new-password" placeholder="Enter at least 6 characters" maxlength="30">
      </div>
      <div class="input-group">
        <label for="confirm-password">Confirm New Password</label>
        <input type="password" id="confirm-password" placeholder="Re-enter password" maxlength="30">
      </div>
      <button class="btn-primary" onclick="updatePassword()" type="button">Update Password</button>
    </div>
  </section>
</div>
<footer class="footer-legal">© 2025 SkyWings Airline Management System</footer>
<script src="utils.js"></script>
<script>
function init() {
  const user = AMS.getUser();
  if (!user || user.isGuest || user.isAdmin || !user.mustResetPassword) {
    window.location.href = 'login.html';
    return;
  }
  document.getElementById('user-id').textContent = user.passengerId || 'Unknown';
}
function updatePassword() {
  const newPwd = document.getElementById('new-password').value.trim();
  const confirmPwd = document.getElementById('confirm-password').value.trim();
  const status = document.getElementById('status-msg');
  status.textContent = '';
  status.className = 'msg';
  if (!newPwd || newPwd.length < 6) {
    status.textContent = 'Create a password with at least 6 characters';
    return;
  }
  if (newPwd !== confirmPwd) {
    status.textContent = 'Passwords do not match';
    return;
  }
  const user = AMS.getUser();
  if (!user) {
    status.textContent = 'User not found. Please login again.';
    return;
  }
  user.password = newPwd;
  user.mustResetPassword = false;
  AMS.setUser(user);
  if (typeof savePassenger === 'function') {
    savePassenger(user);
  }
  status.textContent = 'Password updated successfully. Redirecting...';
  status.className = 'msg success';
  setTimeout(() => window.location.href = 'home.html', 800);
}
window.addEventListener('DOMContentLoaded', init);
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    e.preventDefault();
    updatePassword();
  }
});
</script>
</body>
</html>
